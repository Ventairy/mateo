name: mateo_mobile
description: >-
  The Flutter implementation of Mateo Mobile, a simple, expressive, warm design
  system for touch-first Android and iOS applications.
version: 0.1.2
homepage: https://github.com/Ventairy/mateo
repository: https://github.com/Ventairy/mateo/tree/main/packages/flutter/mateo-mobile-flutter
issue_tracker: https://github.com/Ventairy/mateo/issues
documentation: https://pub.dev/documentation/mateo_mobile/latest/
topics:
  - flutter
  - design-system
  - mobile-ui
  - widgets
  - animations

platforms:
  android:
  ios:

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  maplibre_gl: ^0.26.2
  oh_my_flutter: ^0.3.0

dev_dependencies:
  alchemist: ^0.14.0
  build_runner: ^2.15.0
  dotdart: ^0.6.1
  flutter_test:
    sdk: flutter
  freezed: ">=3.2.5 <3.2.6"
  json_serializable: ">=6.13.0 <6.13.1"
  test_api: ^0.7.0
  very_good_analysis: ">=7.0.0 <11.0.0"

dotdart:
  output: lib/src/gen/
  lottie:
    - assets/lotties/
  svg:
    - assets/icons/

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter_variable.ttf
        - asset: assets/fonts/inter_italic.ttf
          style: italic
