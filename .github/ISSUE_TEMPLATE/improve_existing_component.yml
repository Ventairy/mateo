name: Improve an existing component
description: Propose a change to an existing Mateo component.
title: "[Component]: "
body:
  - type: dropdown
    id: platform
    attributes:
      label: Mateo platform
      description: Select the Mateo platform where this component currently lives.
      options:
        - Mateo Mobile
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: Bottom Sheet, Toast, Dots Loading Indicator
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem should this solve?
      description: Describe the need or product behavior that this component cannot express well today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the smallest useful change to the component, guidance, or public API.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note any API, accessibility, platform, performance, or migration implications you already know about.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, prototypes, or related issues when they help start the conversation.
