name: Bug report
description: Report behavior that is incorrect, inaccessible, or inconsistent.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Thanks for helping Mateo improve. Please do not report security vulnerabilities here.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Design system guidance
        - mateo-mobile-flutter
        - Repository tooling
        - Other or not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Package version, release tag, or commit SHA where you observed the problem.
      placeholder: mateo_mobile 0.1.0
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Describe the incorrect behavior and its effect on the person using the product.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Share the smallest example or sequence that consistently demonstrates the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant platform, OS, Flutter or language version, assistive technology, and device details.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched for an existing issue that describes this problem.
          required: true
        - label: This report does not contain credentials, private data, or a security vulnerability.
          required: true
