name: Documentation

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - .github/workflows/docs.yml

permissions:
  contents: read

jobs:
  links:
    name: Local Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Check local Markdown links
        run: |
          ruby <<'RUBY'
          require 'pathname'

          failures = []

          Dir.glob('**/*.md', File::FNM_DOTMATCH).each do |file|
            next if file.start_with?('.git/')

            text = File.read(file)
            text.to_enum(:scan, /\[[^\]]+\]\(([^)]+)\)/).each do
              match = Regexp.last_match
              href = match[1]
              next if href.start_with?('#')
              next if href.match?(/\A[a-z][a-z0-9+.-]*:/i)

              target = href.split('#', 2).first
              next if target.empty?

              candidate = (Pathname(file).dirname + target).cleanpath
              next if candidate.exist?

              failures << {
                file: file,
                line: text[0...match.begin(0)].count("\n") + 1,
                href: href,
                target: candidate.to_s
              }
            end
          end

          if failures.any?
            def escape_command(value)
              value.to_s
                .gsub('%', '%25')
                .gsub("\r", '%0D')
                .gsub("\n", '%0A')
            end

            def escape_property(value)
              escape_command(value)
                .gsub(':', '%3A')
                .gsub(',', '%2C')
            end

            puts
            puts 'Broken local Markdown links'
            noun = failures.length == 1 ? 'link' : 'links'
            verb = failures.length == 1 ? 'points' : 'point'
            puts "Found #{failures.length} #{noun} that #{verb} to missing files."

            failures.each_with_index do |failure, index|
              message = "#{failure[:href]} resolves to missing path #{failure[:target]}"
              puts "::error file=#{escape_property(failure[:file])},line=#{failure[:line]},title=Broken local Markdown link::#{escape_command(message)}"
              puts
              puts "#{index + 1}. #{failure[:file]}:#{failure[:line]}"
              puts "   Link: #{failure[:href]}"
              puts "   Resolved path: #{failure[:target]}"
            end

            puts
            puts 'Update each link relative to its Markdown file, or restore the missing target.'
            exit 1
          end
          RUBY
