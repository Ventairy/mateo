name: Publish mateo-mobile-flutter

on:
  push:
    tags:
      - 'mateo-mobile-flutter-v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: publish-mateo-mobile-flutter
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify release tag
    if: vars.PUB_AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      PANA_MAX_DEFICIT: 0
    defaults:
      run:
        working-directory: packages/flutter/mateo-mobile-flutter
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Match tag and package versions
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          tag_version="${RELEASE_TAG#mateo-mobile-flutter-v}"
          package_version="$(ruby -e 'match = File.read("pubspec.yaml").match(/^version: (.+)$/) or abort("pubspec.yaml is missing a version field"); puts match[1]')"

          if [ "$tag_version" != "$package_version" ]; then
            echo "::error title=Release tag does not match pubspec version::Tag $RELEASE_TAG resolves to $tag_version, but pubspec.yaml contains $package_version."
            exit 1
          fi

      - name: Read Flutter version
        id: fvmrc
        run: |
          echo "flutter-version=$(ruby -rjson -e 'puts JSON.parse(File.read(".fvmrc")).fetch("flutter")')" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ steps.fvmrc.outputs.flutter-version }}
          cache: true

      - name: Set up FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          fvm install

      - name: Resolve hosted dependencies
        run: |
          fvm flutter pub get
          cd example
          fvm flutter pub get

      - name: Require hosted release dependencies
        run: |
          test ! -f pubspec_overrides.yaml
          test ! -f example/pubspec_overrides.yaml

      - name: Generate source
        run: |
          fvm dart run build_runner build
          fvm dart format lib

      - name: Require committed generated source
        run: git diff --exit-code -- lib

      - name: Check formatting
        run: fvm dart format --output none --set-exit-if-changed lib test example/lib/main.dart

      - name: Analyze package
        run: fvm flutter analyze --fatal-infos

      - name: Run tests and Linux goldens
        run: fvm flutter test

      - name: Validate API documentation
        run: fvm dart doc --validate-links

      - name: Analyze example
        run: fvm flutter analyze --fatal-infos
        working-directory: packages/flutter/mateo-mobile-flutter/example

      - name: Validate pub.dev archive
        run: fvm flutter pub publish --dry-run

      - name: Score package quality
        run: |
          fvm dart pub global activate pana
          fvm dart pub global run pana --exit-code-threshold "$PANA_MAX_DEFICIT" .

  publish:
    name: Publish to pub.dev
    needs: verify
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
    with:
      working-directory: packages/flutter/mateo-mobile-flutter
      environment: pub.dev
